<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESET KeyGen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; color: #60a5fa; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.8rem; color: #475569; margin-bottom: 1.75rem; }
    .form { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; }
    select {
      background: #1e293b; color: #e2e8f0;
      border: 1px solid #334155; padding: 0.45rem 0.7rem;
      border-radius: 0.375rem; font-size: 0.875rem; cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #3b82f6; }
    button#btn {
      background: #3b82f6; color: #fff; border: none;
      padding: 0.45rem 1.4rem; border-radius: 0.375rem;
      font-size: 0.875rem; cursor: pointer; font-weight: 500;
    }
    button#btn:hover:not(:disabled) { background: #2563eb; }
    button#btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    #status { font-size: 0.78rem; color: #64748b; margin-bottom: 0.4rem; min-height: 1.1rem; }
    #log {
      background: #020617; border: 1px solid #1e293b; border-radius: 0.375rem;
      padding: 0.9rem 1rem; font-family: 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 0.78rem; line-height: 1.6; height: 380px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #64748b;
    }
    .ok   { color: #4ade80; }
    .err  { color: #f87171; }
    .info { color: #38bdf8; }
    .warn { color: #fbbf24; }
    #result {
      margin-top: 1.25rem; background: #0d1f12; border: 1px solid #166534;
      border-radius: 0.5rem; padding: 1rem 1.25rem; display: none;
    }
    #result h2 { font-size: 0.9rem; color: #4ade80; margin-bottom: 0.85rem; letter-spacing: 0.03em; }
    .kv { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.85rem; align-items: baseline; }
    .kv .k { color: #4b7a5e; min-width: 110px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .kv .v { color: #d1fae5; font-family: monospace; }
    .kv .v.key { color: #fbbf24; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; }
    #error-box {
      margin-top: 1rem; background: #1c0a0a; border: 1px solid #7f1d1d;
      border-radius: 0.375rem; padding: 0.75rem 1rem; font-size: 0.82rem;
      color: #fca5a5; display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ESET KeyGen</h1>
    <p class="subtitle">Genera trial key e account ESET via browser</p>

    <div class="form">
      <div class="field">
        <label>Modalità</label>
        <select id="mode">
          <option value="key">ESET HOME Key</option>
          <option value="account">Account ESET HOME</option>
          <option value="small-business-key">Small Business Key</option>
          <option value="advanced-key">Advanced Key</option>
          <option value="protecthub-account">ProtectHub Account</option>
        </select>
      </div>
      <div class="field">
        <label>Email API</label>
        <select id="emailapi">
          <option value="emailfake">emailfake</option>
          <option value="inboxes">inboxes</option>
          <option value="1secmail">1secmail</option>
          <option value="guerrillamail">guerrillamail</option>
          <option value="mailticking">mailticking</option>
          <option value="fakemail">fakemail</option>
          <option value="incognitomail">incognitomail</option>
        </select>
      </div>
      <button id="btn" onclick="run()">&#9654; Genera</button>
    </div>

    <div id="status"></div>
    <div id="log"></div>
    <div id="error-box"></div>
    <div id="result">
      <h2>&#10003; Risultato</h2>
      <div id="result-content"></div>
    </div>
  </div>

  <script>
    let es = null;

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function colorLine(line) {
      const l = line.toLowerCase();
      if (l.includes('[ ok ]') || l.match(/\bok\b/))  return `<span class="ok">${esc(line)}</span>`;
      if (l.includes('[ failed ]') || l.includes('error') || l.includes('failed') || l.includes('exception'))
        return `<span class="err">${esc(line)}</span>`;
      if (l.includes('[ info ]') || l.includes('[info]') || l.startsWith('['))
        return `<span class="info">${esc(line)}</span>`;
      if (l.includes('warning') || l.includes('warn'))
        return `<span class="warn">${esc(line)}</span>`;
      return esc(line);
    }

    function parseResult(text) {
      const patterns = [
        ['Email',    /Account Email:\s*(.+)/i],
        ['Password', /Account Password:\s*(.+)/i],
        ['Licenza',  /License Name:\s*(.+)/i],
        ['Key',      /License Key:\s*(.+)/i],
        ['Scadenza', /License Out Date:\s*(.+)/i],
      ];
      return patterns.reduce((acc, [label, re]) => {
        const m = text.match(re);
        if (m) acc[label] = m[1].trim();
        return acc;
      }, {});
    }

    function run() {
      const mode = document.getElementById('mode').value;
      const api  = document.getElementById('emailapi').value;
      const log  = document.getElementById('log');
      const btn  = document.getElementById('btn');
      const statusEl = document.getElementById('status');
      const result   = document.getElementById('result');
      const errBox   = document.getElementById('error-box');

      if (es) { es.close(); es = null; }

      log.innerHTML = '';
      result.style.display = 'none';
      errBox.style.display = 'none';
      btn.disabled = true;
      statusEl.textContent = 'In esecuzione…';

      let fullText = '';

      es = new EventSource(`/run?mode=${mode}&email_api=${api}`);

      es.onmessage = e => {
        if (e.data === '__DONE__') {
          es.close(); es = null;
          btn.disabled = false;
          statusEl.textContent = 'Completato.';

          const fields = parseResult(fullText);
          if (Object.keys(fields).length) {
            document.getElementById('result-content').innerHTML = Object.entries(fields)
              .map(([k, v]) =>
                `<div class="kv"><span class="k">${esc(k)}</span><span class="v ${k === 'Key' ? 'key' : ''}">${esc(v)}</span></div>`
              ).join('');
            result.style.display = 'block';
          }
          return;
        }
        fullText += e.data + '\n';
        log.innerHTML += colorLine(e.data) + '\n';
        log.scrollTop = log.scrollHeight;
      };

      es.onerror = () => {
        es.close(); es = null;
        btn.disabled = false;
        if (statusEl.textContent === 'In esecuzione…') {
          statusEl.textContent = '';
          errBox.textContent = 'Connessione interrotta. Controlla che il server sia attivo.';
          errBox.style.display = 'block';
        }
      };
    }
  </script>
</body>
</html>
