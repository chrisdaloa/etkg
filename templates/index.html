<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESET KeyGen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
    .layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }
    .container { min-width: 0; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    h1 { font-size: 1.4rem; color: #60a5fa; margin-bottom: 0.2rem; }
    .subtitle { font-size: 0.78rem; color: #475569; margin-bottom: 1.75rem; }

    /* ── sections ── */
    .section { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 0.85rem; }

    /* ── grid of fields ── */
    .fields { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field.grow { flex: 1; min-width: 160px; }
    label { font-size: 0.7rem; color: #64748b; letter-spacing: 0.04em; }
    select, input[type="text"], input[type="number"] {
      background: #0f172a; color: #e2e8f0;
      border: 1px solid #334155; padding: 0.4rem 0.65rem;
      border-radius: 0.375rem; font-size: 0.85rem;
    }
    select:focus, input:focus { outline: none; border-color: #3b82f6; }
    input[type="number"] { width: 80px; }

    /* ── checkboxes ── */
    .checks { display: flex; flex-wrap: wrap; gap: 0.5rem 1.25rem; margin-top: 0.25rem; }
    .check { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.82rem; color: #94a3b8; user-select: none; }
    .check input { accent-color: #3b82f6; width: 14px; height: 14px; cursor: pointer; }

    /* ── advanced toggle ── */
    .adv-toggle { font-size: 0.78rem; color: #3b82f6; cursor: pointer; margin-bottom: 0.75rem; display: inline-flex; align-items: center; gap: 0.3rem; background: none; border: none; padding: 0; }
    .adv-toggle:hover { color: #60a5fa; }
    #adv-section { display: none; }

    /* ── run / stop buttons ── */
    .run-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.25rem; flex-wrap: wrap; }
    button#btn {
      background: #3b82f6; color: #fff; border: none;
      padding: 0.5rem 1.75rem; border-radius: 0.375rem;
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
    }
    button#btn:hover:not(:disabled) { background: #2563eb; }
    button#btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    button#stop-btn {
      background: #dc2626; color: #fff; border: none;
      padding: 0.5rem 1.25rem; border-radius: 0.375rem;
      font-size: 0.9rem; font-weight: 500; cursor: pointer; display: none;
    }
    button#stop-btn:hover { background: #b91c1c; }
    #status { font-size: 0.78rem; color: #64748b; }

    /* ── log ── */
    #log {
      background: #020617; border: 1px solid #1e293b; border-radius: 0.375rem;
      padding: 0.9rem 1rem; font-family: 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 0.77rem; line-height: 1.6; height: 360px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #475569;
    }
    .ok   { color: #4ade80; }
    .err  { color: #f87171; }
    .info { color: #38bdf8; }
    .warn { color: #fbbf24; }

    /* ── result cards ── */
    #results-container { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .result-card {
      border-radius: 0.5rem; padding: 1rem 1.25rem;
    }
    .result-card.success { background: #0d1f12; border: 1px solid #166534; }
    .result-card.error   { background: #1c0a0a; border: 1px solid #7f1d1d; }
    .result-card .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .result-card h2 { font-size: 0.88rem; margin-bottom: 0; }
    .result-card.success h2 { color: #4ade80; }
    .result-card.error   h2 { color: #f87171; }
    .kv { display: flex; gap: 0.5rem; margin-bottom: 0.35rem; font-size: 0.84rem; align-items: baseline; }
    .kv .k { color: #4b7a5e; min-width: 110px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .kv .v { color: #d1fae5; font-family: monospace; }
    .kv .v.key { color: #fbbf24; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; }
    .error-text { font-family: monospace; font-size: 0.75rem; color: #fca5a5; white-space: pre-wrap; word-break: break-all; }
    #conn-error {
      margin-top: 0.75rem; background: #1c0a0a; border: 1px solid #7f1d1d;
      border-radius: 0.375rem; padding: 0.75rem 1rem; font-size: 0.82rem;
      color: #fca5a5; display: none;
    }

    /* ── sidebar ── */
    .sidebar { position: sticky; top: 1rem; }
    .sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .sidebar-title button { font-size: 0.68rem; }
    .file-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; margin-bottom: 0.75rem; overflow: hidden; }
    .file-card-header { padding: 0.55rem 0.75rem; font-size: 0.75rem; color: #94a3b8; cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; }
    .file-card-header:hover { background: #243044; }
    .file-card-header .fname { color: #60a5fa; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-card-body { border-top: 1px solid #334155; }
    .entry { padding: 0.6rem 0.75rem; border-bottom: 1px solid #1e293b; font-size: 0.75rem; }
    .entry:last-child { border-bottom: none; }
    .entry-row { display: flex; justify-content: space-between; align-items: center; gap: 0.3rem; margin-bottom: 0.2rem; }
    .entry-label { color: #64748b; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; }
    .entry-val { color: #e2e8f0; font-family: monospace; word-break: break-all; }
    .entry-val.ekey { color: #fbbf24; font-weight: 700; }
    .empty-sidebar { color: #334155; font-size: 0.78rem; text-align: center; padding: 1.5rem 0; }

    /* ── copy buttons ── */
    .copy-btn {
      background: #1e293b; color: #64748b; border: 1px solid #334155;
      border-radius: 0.25rem; padding: 0.15rem 0.5rem; font-size: 0.7rem;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: #e2e8f0; border-color: #64748b; }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
    .log-header span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #334155; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .result-header h2 { margin-bottom: 0; }
  </style>
</head>
<body>
<div class="layout">
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.2rem">
    <h1>ESET KeyGen</h1>
    <a href="/logout" style="font-size:0.75rem;color:#475569;text-decoration:none;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#475569'">Esci</a>
  </div>
  <p class="subtitle">Genera trial key e account ESET via browser</p>

  <!-- Main settings -->
  <div class="section">
    <div class="section-title">Impostazioni principali</div>
    <div class="fields">
      <div class="field grow">
        <label>Modalità</label>
        <select id="mode">
          <option value="key">ESET HOME Key</option>
          <option value="account">Account ESET HOME</option>
          <option value="small-business-key">Small Business Key</option>
          <option value="advanced-key">Advanced Key</option>
          <option value="protecthub-account">ProtectHub Account</option>
        </select>
      </div>
      <div class="field grow">
        <label>Browser</label>
        <select id="browser">
          <option value="chrome">Google Chrome</option>
          <option value="firefox">Mozilla Firefox</option>
          <option value="waterfox">Waterfox</option>
          <option value="edge">Microsoft Edge</option>
          <option value="auto-detect-browser">Auto-detect</option>
        </select>
      </div>
      <div class="field grow">
        <label>Email API</label>
        <select id="emailapi">
          <option value="emailfake">emailfake</option>
          <option value="inboxes">inboxes</option>
          <option value="1secmail">1secmail</option>
          <option value="guerrillamail">guerrillamail</option>
          <option value="mailticking">mailticking</option>
          <option value="fakemail">fakemail</option>
          <option value="incognitomail">incognitomail</option>
        </select>
      </div>
      <div class="field">
        <label>Ripetizioni</label>
        <input type="number" id="repeat" value="1" min="1" max="50">
      </div>
    </div>
  </div>

  <!-- Advanced settings -->
  <button class="adv-toggle" onclick="toggleAdv(this)">&#9656; Impostazioni avanzate</button>
  <div id="adv-section">
    <div class="section">
      <div class="section-title">Browser</div>
      <div class="fields">
        <div class="field grow">
          <label>Percorso browser custom</label>
          <input type="text" id="custom_browser_location" placeholder="/usr/bin/google-chrome">
        </div>
      </div>
      <div class="checks" style="margin-top:0.75rem">
        <label class="check"><input type="checkbox" id="no_headless"> Mostra browser (no headless)</label>
        <label class="check"><input type="checkbox" id="skip_webdriver_menu" checked> Usa selenium-manager (skip webdriver menu)</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Email</div>
      <div class="checks">
        <label class="check"><input type="checkbox" id="custom_email_api"> Usa email personalizzata (custom email API)</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Sorgente Proxy</div>
      <div class="fields">
        <div class="field grow">
          <label>URL lista proxy (Webshare, ProxyList, o qualsiasi URL che restituisce ip:porta:user:pass)</label>
          <input type="text" id="webshare_url" placeholder="https://proxy.webshare.io/api/v2/proxy/list/download/...">
        </div>
      </div>
      <div style="margin-top:0.6rem; display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
        <button class="copy-btn" style="padding:0.3rem 0.75rem;" onclick="refreshProxies()">&#8635; Carica proxy</button>
        <span id="proxy-status" style="font-size:0.75rem; color:#64748b;">Nessun proxy caricato</span>
      </div>
      <div class="checks" style="margin-top:0.6rem">
        <label class="check"><input type="checkbox" id="use_proxy_pool"> Usa proxy pool (random ad ogni run)</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Output</div>
      <div class="fields">
        <div class="field grow">
          <label>Percorso file output (lascia vuoto per default)</label>
          <input type="text" id="output_file" placeholder="es. /root/keys.txt">
        </div>
        <div class="field grow">
          <label>File proxy</label>
          <input type="text" id="proxy_file" placeholder="proxies.txt">
        </div>
      </div>
      <div class="checks" style="margin-top:0.75rem">
        <label class="check"><input type="checkbox" id="disable_output_file"> Non salvare file output</label>
        <label class="check"><input type="checkbox" id="disable_logging" checked> Disabilita logging su file</label>
        <label class="check"><input type="checkbox" id="skip_update_check" checked> Salta controllo aggiornamenti</label>
        <label class="check"><input type="checkbox" id="disable_progress_bar" checked> Disabilita barra progresso</label>
      </div>
    </div>
  </div>

  <!-- Run -->
  <div class="run-row">
    <button id="btn" onclick="run()">&#9654; Genera</button>
    <button id="stop-btn" onclick="stopRun()">&#9632; Stop</button>
    <button class="copy-btn" style="padding:0.4rem 0.9rem;" onclick="saveConfig(this)">&#128190; Salva impostazioni</button>
    <span id="status"></span>
  </div>

  <div style="margin-top:1rem">
    <div class="log-header">
      <span>Log</span>
      <button class="copy-btn" onclick="copyLog(this)">Copia log</button>
    </div>
    <div id="log"></div>
    <div id="conn-error"></div>
    <div id="results-container"></div>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title">
    <span>Ultimi file generati</span>
    <button class="copy-btn" onclick="loadFiles()">&#8635; Aggiorna</button>
  </div>
  <div id="sidebar-content"><p class="empty-sidebar">Nessun file trovato</p></div>
</div>

</div><!-- end .layout -->

<script>
  function toggleAdv(btn) {
    const sec = document.getElementById('adv-section');
    const open = sec.style.display === 'block';
    sec.style.display = open ? 'none' : 'block';
    btn.textContent = (open ? '▶' : '▼') + ' Impostazioni avanzate';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function colorLine(line) {
    const l = line.toLowerCase();
    if (l.includes('[ ok ]') || l.match(/\bok\b/)) return `<span class="ok">${esc(line)}</span>`;
    if (l.includes('[ failed ]') || l.includes('error') || l.includes('failed') || l.includes('exception'))
      return `<span class="err">${esc(line)}</span>`;
    if (l.includes('[ info ]') || l.includes('[info]') || l.startsWith('['))
      return `<span class="info">${esc(line)}</span>`;
    if (l.includes('warning') || l.includes('warn'))
      return `<span class="warn">${esc(line)}</span>`;
    return esc(line);
  }

  function parseResult(text) {
    return [
      ['Email',    /Account Email:\s*(.+)/i],
      ['Password', /Account Password:\s*(.+)/i],
      ['Licenza',  /License Name:\s*(.+)/i],
      ['Key',      /License Key:\s*(.+)/i],
      ['Scadenza', /License Out Date:\s*(.+)/i],
    ].reduce((acc, [label, re]) => {
      const m = text.match(re);
      if (m) acc[label] = m[1].trim();
      return acc;
    }, {});
  }

  function buildConfig() {
    return {
      mode:                    document.getElementById('mode').value,
      browser:                 document.getElementById('browser').value,
      email_api:               document.getElementById('emailapi').value,
      repeat:                  parseInt(document.getElementById('repeat').value) || 1,
      no_headless:             document.getElementById('no_headless').checked,
      custom_browser_location: document.getElementById('custom_browser_location').value.trim(),
      custom_email_api:        document.getElementById('custom_email_api').checked,
      skip_webdriver_menu:     document.getElementById('skip_webdriver_menu').checked,
      skip_update_check:       document.getElementById('skip_update_check').checked,
      disable_progress_bar:    document.getElementById('disable_progress_bar').checked,
      disable_output_file:     document.getElementById('disable_output_file').checked,
      output_file:             document.getElementById('output_file').value.trim(),
      proxy_file:              document.getElementById('proxy_file').value.trim(),
      disable_logging:         document.getElementById('disable_logging').checked,
      use_proxy_pool:          document.getElementById('use_proxy_pool').checked,
    };
  }

  function buildFullConfig() {
    return {
      ...buildConfig(),
      proxy_source_url: document.getElementById('webshare_url').value.trim(),
    };
  }

  async function loadConfig() {
    try {
      const r = await fetch('/config');
      if (r.status === 401) { window.location.href = '/login'; return; }
      const cfg = await r.json();
      const set = (id, val) => { const el = document.getElementById(id); if (el) { if (el.type === 'checkbox') el.checked = !!val; else el.value = val ?? ''; } };
      set('mode',                    cfg.mode);
      set('browser',                 cfg.browser);
      set('emailapi',                cfg.email_api);
      set('repeat',                  cfg.repeat);
      set('no_headless',             cfg.no_headless);
      set('custom_browser_location', cfg.custom_browser_location);
      set('custom_email_api',        cfg.custom_email_api);
      set('skip_webdriver_menu',     cfg.skip_webdriver_menu);
      set('skip_update_check',       cfg.skip_update_check);
      set('disable_progress_bar',    cfg.disable_progress_bar);
      set('disable_output_file',     cfg.disable_output_file);
      set('output_file',             cfg.output_file);
      set('proxy_file',              cfg.proxy_file);
      set('disable_logging',         cfg.disable_logging);
      set('use_proxy_pool',          cfg.use_proxy_pool);
      if (cfg.proxy_source_url) {
        set('webshare_url', cfg.proxy_source_url);
        // auto-load proxies if URL is saved
        document.getElementById('webshare_url').value = cfg.proxy_source_url;
        await refreshProxies();
      }
    } catch { }
  }

  async function saveConfig(btn) {
    try {
      const resp = await fetch('/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildFullConfig()),
      });
      if (!resp.ok) throw new Error((await resp.json()).detail);
      btn.textContent = '✓ Salvato';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '💾 Salva impostazioni'; btn.classList.remove('copied'); }, 1500);
    } catch(e) {
      alert('Errore salvataggio: ' + e.message);
    }
  }

  loadConfig();

  async function refreshProxies() {
    const url = document.getElementById('webshare_url').value.trim();
    if (!url) { alert('Inserisci prima l\'URL Webshare'); return; }
    const statusEl = document.getElementById('proxy-status');
    statusEl.textContent = 'Caricamento…';
    try {
      const resp = await fetch('/proxies/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail);
      }
      const data = await resp.json();
      const d = new Date(data.updated_at * 1000);
      statusEl.textContent = `✓ ${data.count} proxy caricati (${d.toLocaleTimeString()})`;
      statusEl.style.color = '#4ade80';
    } catch(e) {
      statusEl.textContent = `Errore: ${e.message}`;
      statusEl.style.color = '#f87171';
    }
  }

  async function loadProxyStatus() {
    try {
      const data = await fetch('/proxies/status').then(r => r.json());
      if (data.count > 0) {
        const d = new Date(data.updated_at * 1000);
        const el = document.getElementById('proxy-status');
        el.textContent = `✓ ${data.count} proxy caricati (${d.toLocaleTimeString()})`;
        el.style.color = '#4ade80';
        if (data.source_url) document.getElementById('webshare_url').value = data.source_url;
      }
    } catch { }
  }

  loadProxyStatus();

  async function loadFiles() {
    try {
      const data = await fetch('/files').then(r => r.json());
      const el = document.getElementById('sidebar-content');
      if (!data.length) { el.innerHTML = '<p class="empty-sidebar">Nessun file trovato</p>'; return; }
      el.innerHTML = data.map((f, fi) => `
        <div class="file-card">
          <div class="file-card-header" onclick="toggleCard(${fi})">
            <span class="fname">${esc(f.filename)}</span>
            <span id="card-arrow-${fi}">&#9660;</span>
          </div>
          <div class="file-card-body" id="card-body-${fi}">
            ${f.entries.length ? f.entries.map(e => `
              <div class="entry">
                <div class="entry-row" style="margin-bottom:0.4rem">
                  <span class="entry-label">Voce</span>
                  <button class="copy-btn" onclick="copyEntry(this,${JSON.stringify(e)})">Copia tutto</button>
                </div>
                ${e.email    ? `<div class="entry-row"><span class="entry-label">Email</span><button class="copy-btn" onclick="copyText(this,${JSON.stringify(e.email)})">Copia</button></div><div class="entry-val">${esc(e.email)}</div>` : ''}
                ${e.password ? `<div class="entry-row"><span class="entry-label">Password</span><button class="copy-btn" onclick="copyText(this,${JSON.stringify(e.password)})">Copia</button></div><div class="entry-val">${esc(e.password)}</div>` : ''}
                ${e.license  ? `<div class="entry-row"><span class="entry-label">Licenza</span></div><div class="entry-val">${esc(e.license)}</div>` : ''}
                ${e.key      ? `<div class="entry-row"><span class="entry-label">Key</span><button class="copy-btn" onclick="copyText(this,${JSON.stringify(e.key)})">Copia</button></div><div class="entry-val ekey">${esc(e.key)}</div>` : ''}
                ${e.expiry   ? `<div class="entry-row"><span class="entry-label">Scadenza</span></div><div class="entry-val">${esc(e.expiry)}</div>` : ''}
              </div>`).join('') : '<div class="entry" style="color:#475569">Nessuna voce</div>'}
          </div>
        </div>`).join('');
    } catch { }
  }

  function toggleCard(fi) {
    const body  = document.getElementById(`card-body-${fi}`);
    const arrow = document.getElementById(`card-arrow-${fi}`);
    const open  = body.style.display !== 'none';
    body.style.display  = open ? 'none' : '';
    arrow.innerHTML = open ? '&#9654;' : '&#9660;';
  }

  loadFiles();

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copia'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function copyLog(btn) {
    copyText(btn, document.getElementById('log').innerText);
  }

  function copyEntry(btn, e) {
    const lines = [
      e.email    ? `Email: ${e.email}`       : '',
      e.password ? `Password: ${e.password}` : '',
      e.license  ? `Licenza: ${e.license}`   : '',
      e.key      ? `Key: ${e.key}`           : '',
      e.expiry   ? `Scadenza: ${e.expiry}`   : '',
    ].filter(Boolean).join('\n');
    copyText(btn, lines);
  }

  function copyCardFields(btn, cardId) {
    const rows = document.querySelectorAll(`#${cardId} .kv`);
    const text = [...rows].map(r => `${r.querySelector('.k').textContent}: ${r.querySelector('.v').textContent}`).join('\n');
    copyText(btn, text);
  }

  async function stopRun() {
    await fetch('/stop', { method: 'POST' });
  }

  function makeResultCard(index, fields, errorText) {
    const id = `rc-${index}`;
    const isErr = !!errorText;
    const title = isErr ? `✗ Ripetizione ${index} — Errore` : `✓ Ripetizione ${index}`;
    let inner = '';
    if (isErr) {
      inner = `<button class="copy-btn" onclick="copyText(this,${JSON.stringify(errorText)})">Copia errore</button>
               <div class="error-text" style="margin-top:0.5rem">${esc(errorText)}</div>`;
    } else {
      const copyable = new Set(['Email', 'Password', 'Key']);
      inner = Object.entries(fields).map(([k, v]) => {
        const cpBtn = copyable.has(k)
          ? `<button class="copy-btn" onclick="copyText(this,${JSON.stringify(v)})">Copia</button>`
          : '';
        return `<div class="kv"><span class="k">${esc(k)}</span><span class="v ${k==='Key'?'key':''}">${esc(v)}</span>${cpBtn}</div>`;
      }).join('');
    }
    const card = document.createElement('div');
    card.className = `result-card ${isErr ? 'error' : 'success'}`;
    card.id = id;
    card.innerHTML = `
      <div class="result-header">
        <h2>${title}</h2>
        ${!isErr ? `<button class="copy-btn" onclick="copyCardFields(this,'${id}')">Copia tutto</button>` : ''}
      </div>
      ${inner}`;
    document.getElementById('results-container').appendChild(card);
  }

  let reader = null;

  async function run() {
    const btnRun  = document.getElementById('btn');
    const btnStop = document.getElementById('stop-btn');
    const log     = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const connErr  = document.getElementById('conn-error');

    if (reader) { reader.cancel(); reader = null; }

    log.innerHTML = '';
    document.getElementById('results-container').innerHTML = '';
    connErr.style.display = 'none';
    btnRun.disabled = true;
    btnStop.style.display = 'inline-block';
    statusEl.textContent = 'In esecuzione…';

    // state machine
    const SEP = '-'.repeat(49);
    let inBlock = false, blockLines = [], inError = false, errorLines = [], resultIdx = 0;

    function flushError() {
      if (inError && errorLines.length) {
        makeResultCard(++resultIdx, null, errorLines.join('\n'));
        inError = false; errorLines = [];
      }
    }

    function processLine(line) {
      if (line === SEP) {
        if (!inBlock) {
          flushError();
          inBlock = true; blockLines = [];
        } else {
          inBlock = false;
          const fields = parseResult(blockLines.join('\n'));
          if (Object.keys(fields).length) makeResultCard(++resultIdx, fields, null);
          blockLines = [];
        }
        return;
      }
      if (inBlock) { blockLines.push(line); return; }
      if (line.includes('[ FAILED ]') || inError) { inError = true; errorLines.push(line); }
    }

    try {
      const resp = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildConfig()),
      });
      if (resp.status === 401) { window.location.href = '/login'; return; }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }

      reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          if (!part.startsWith('data:')) continue;
          const line = part.replace(/^data:\s?/, '');
          if (line === '__DONE__') {
            reader = null;
            flushError();
            btnRun.disabled = false;
            btnStop.style.display = 'none';
            statusEl.textContent = 'Completato.';
            loadFiles();
            return;
          }
          log.innerHTML += colorLine(line) + '\n';
          log.scrollTop = log.scrollHeight;
          processLine(line);
        }
      }
    } catch (e) {
      btnRun.disabled = false;
      btnStop.style.display = 'none';
      statusEl.textContent = '';
      connErr.textContent = e.message || 'Errore di connessione.';
      connErr.style.display = 'block';
    }
  }
</script>
